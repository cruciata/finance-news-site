<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>范の财经 | Fan Finance</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 3D Background Canvas -->
  <canvas id="bgCanvas" class="bg-canvas"></canvas>
  
  <!-- Floating Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  
  <div class="container">
    <!-- Hero Section -->
    <header class="hero">
      <div class="hero-content">
        <div class="logo-wrapper">
          <div class="logo-3d">
            <span class="logo-icon">📈</span>
          </div>
          <h1 class="title">
            <span class="title-main">范の财经</span>
            <span class="title-glow">范の财经</span>
          </h1>
        </div>
        <p class="subtitle">
          <span class="gradient-text">黄金 · 股市</span>
          <span class="divider">|</span>
          <span id="lastUpdate">加载中...</span>
        </p>
      </div>
      
      <div class="hero-actions">
        <button class="btn-icon" id="refreshBtn" title="刷新">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Filter Tabs -->
    <nav class="filter-tabs" id="filterBar">
      <button class="tab active" data-filter="all">
        <span class="tab-glow"></span>
        <span class="tab-text">全部</span>
      </button>
      <button class="tab" data-filter="财经">
        <span class="tab-glow"></span>
        <span class="tab-text">💰 财经</span>
      </button>
      <button class="tab" data-filter="科技">
        <span class="tab-glow"></span>
        <span class="tab-text">💻 科技</span>
      </button>
      <button class="tab" data-filter="创业">
        <span class="tab-glow"></span>
        <span class="tab-text">🚀 创业</span>
      </button>
    </nav>

    <!-- News Grid -->
    <main class="news-grid" id="newsGrid">
      <div class="loading-state">
        <div class="loader">
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
        </div>
        <p class="loading-text">正在加载市场数据...</p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-content">
        <p class="footer-brand">
          <span class="brand-icon">📈</span>
          <span>范の财经</span>
        </p>
        <p class="footer-meta">
          <span>© <span id="year"></span></span>
          <span class="dot">·</span>
          <span>每2小时更新</span>
        </p>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
